<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Pluvial - Cd. Juárez</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* (Tus estilos se mantienen igual, solo añadimos colores para infraestructura) */
        :root {
            --dark: #2c3e50; --accent: #f1c40f; --white: #ffffff; --danger: #c0392b;
            --hosp-color: #e74c3c; --comu-color: #9b59b6; --escu-color: #2980b9;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; overflow: hidden; }
        .header { background: var(--dark); color: var(--white); padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; z-index: 1000; }
        .stats-bar { background: #34495e; color: var(--accent); padding: 8px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; margin-top: 10px; display: inline-block; border-radius: 4px; }
        #map { height: calc(100vh - 110px); width: 100%; background: #ddd; }
        #panel-riesgo { position: absolute; top: 130px; left: 20px; width: 260px; max-height: 55vh; background: rgba(255, 255, 255, 0.95); color: #333; z-index: 1000; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-left: 6px solid var(--danger); overflow-y: auto; }
        #panel-riesgo h2 { font-size: 1rem; margin: 0 0 10px 0; color: var(--danger); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .colonia-item { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .legend { background: white; padding: 12px; line-height: 20px; color: #333; box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid #ccc; font-size: 0.8rem; }
        .legend i { width: 12px; height: 12px; float: left; margin-right: 8px; border-radius: 50%; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SISTEMA INTERACTIVO DE INUNDACIONES (CD. JUÁREZ)</h1>
        <div class="stats-bar">
            ESTADO: <span id="alerta">SINCRONIZANDO...</span> | 
            ACTUALIZADO: <span id="hora">--:--:--</span>
        </div>
    </div>
    
    <div id="panel-riesgo">
        <h2>⚠️ Riesgo en Colonias</h2>
        <div id="lista-colonias"><small>Cargando capas...</small></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([31.7333, -106.4833], 12);
        const baseLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Capas
        let capaColonias = L.layerGroup().addTo(map);
        let capaHospitales = L.layerGroup();
        let capaComunitarios = L.layerGroup();
        let capaEscuelas = L.layerGroup();
        let capaCuencas = L.layerGroup();
        let capaVialidades = L.layerGroup();

        const capasSuperpuestas = {
            "🏠 Colonias": capaColonias,
            "🏥 Hospitales 2025": capaHospitales,
            "👥 Centros Comunitarios": capaComunitarios,
            "🎓 Escuelas": capaEscuelas,
            "🌊 Microcuencas": capaCuencas,
            "🛣️ Red Vial": capaVialidades
        };
        L.control.layers(null, capasSuperpuestas, { collapsed: false }).addTo(map);

        function getColor(lluvia) {
            return lluvia > 30 ? '#c0392b' : lluvia > 15 ? '#e67e22' : lluvia > 5 ? '#f1c40f' : lluvia > 0.1 ? '#2ecc71' : '#3498db';
        }

        // --- FUNCIÓN PARA CARGAR PUNTOS SIEMPRE QUE SE ACTIVE LA CAPA ---
        async function gestionarCapaPuntos(nombreCapa, url, capaObjeto, color) {
            if (map.hasLayer(capaObjeto) && capaObjeto.getLayers().length === 0) {
                console.log(`Descargando datos de ${nombreCapa}...`);
                try {
                    const res = await fetch(url);
                    const geojson = await res.json();
                    L.geoJSON(geojson, {
                        pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 6, fillColor: color, color: "#fff", weight: 1, fillOpacity: 0.9 }),
                        onEachFeature: (f, layer) => {
                            const n = f.properties.NOMBRE || f.properties.nombre || "S/N";
                            layer.bindPopup(`<b>${nombreCapa}:</b><br>${n}`);
                        }
                    }).addTo(capaObjeto);
                } catch (e) { console.error(`Error en ${nombreCapa}:`, e); }
            }
        }

        async function sincronizarSistema() {
            try {
                const res = await fetch('/estado');
                const data = await res.json();
                document.getElementById('alerta').innerText = data.alerta;
                document.getElementById('hora').innerText = data.ultima_actualizacion;

                // Sincronizar Colonias
                if (capaColonias.getLayers().length === 0) {
                    const resC = await fetch('/mapa-colonias');
                    const geojsonC = await resC.json();
                    L.geoJSON(geojsonC, {
                        style: (f) => {
                            const n = (f.properties.NOMBRE || f.properties.nombre || "").toUpperCase();
                            const info = data.colonias_criticas.find(c => c.nombre.toUpperCase() === n);
                            const v = info ? info.intensidad : 0;
                            return { fillColor: getColor(v), weight: 1, color: 'white', fillOpacity: v > 0 ? 0.7 : 0.2 };
                        }
                    }).addTo(capaColonias);
                }

                // Disparar carga de infraestructura si el usuario las marcó
                gestionarCapaPuntos("Hospital", "/mapa-hospitales", capaHospitales, "#e74c3c");
                gestionarCapaPuntos("C. Comunitario", "/mapa-comunitarios", capaComunitarios, "#9b59b6");
                gestionarCapaPuntos("Escuela", "/mapa-escuelas", capaEscuelas, "#2980b9");

                // Actualizar Panel
                const lista = document.getElementById('lista-colonias');
                if (data.colonias_criticas.length > 0) {
                    lista.innerHTML = data.colonias_criticas.map(c => `<div class="colonia-item"><b>${c.nombre}</b>: ${c.intensidad} mm/hr</div>`).join('');
                } else {
                    lista.innerHTML = '<small>✅ Sin riesgos críticos.</small>';
                }
            } catch (err) { console.error(err); }
        }

        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<strong>Infraestructura</strong><br>' +
                            '<i style="background:#e74c3c"></i> Hospital<br>' +
                            '<i style="background:#9b59b6"></i> C. Comunitario<br>' +
                            '<i style="background:#2980b9"></i> Escuela<br>';
            return div;
        };
        legend.addTo(map);

        sincronizarSistema();
        setInterval(sincronizarSistema, 10000); // Sincroniza cada 10 seg
    </script>
</body>
</html>
